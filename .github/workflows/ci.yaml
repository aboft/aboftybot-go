name: aboftybot-ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - run: go test ./...

  image:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: imranismail/setup-kustomize@v2

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "OVERLAY=deploy/overlays/prod" >> "$GITHUB_ENV"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "IMAGE_TAG=main-${SHORT_SHA}" >> "$GITHUB_ENV"
            echo "OVERLAY=deploy/overlays/dev" >> "$GITHUB_ENV"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/aboft/aboftybot-go:${{ env.IMAGE_TAG }}

      - name: Update kustomize image tag
        run: |
          cd "$OVERLAY"

          kustomize edit set image ghcr.io/aboft/aboftybot-go=ghcr.io/aboft/aboftybot-go:${IMAGE_TAG}

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add kustomization.yaml
          git commit -m "Deploy ${OVERLAY} ${IMAGE_TAG}" || exit 0

          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              exit 0
            fi

            git rebase --abort || true
            sleep 2
          done

          exit 1