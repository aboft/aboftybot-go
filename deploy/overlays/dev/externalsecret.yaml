apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aboftybot-secret
  namespace: aboftybot-dev
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: kubernetes
    kind: SecretStore

  target:
    name: aboftybot-secret

  dataFrom:
    - extract:
        key: aboftybot-dev